    <h1>지원바라 소개</h1>
    <p>지원바라는 정부지원금, 지원사업, 복지혜택, 창업 및 소상공인 정책 정보를 공식기관 자료를 바탕으로 정리하는 정보 포털입니다.</p>
    <p>지원사업은 기관별 공고 변경이 잦기 때문에, 지원바라는 각 글 하단에 공식 출처 링크를 함께 안내하고 신청 전 원문 확인을 권장합니다.</p>
    <h2>운영 원칙</h2>
    <ul>
      <li>정부 및 공공기관의 공개 자료를 우선 확인합니다.</li>
      <li>대상, 기간, 금액, 신청 방법을 독자가 빠르게 확인할 수 있도록 정리합니다.</li>
      <li>오류 제보와 정정 요청은 확인 후 반영합니다.</li>
    </ul>
