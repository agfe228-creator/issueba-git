    <h1>운영정책</h1>
    <h2>정보 제공 기준</h2>
    <p>지원바라는 정부, 지자체, 공공기관, 유관기관의 공개 자료를 바탕으로 지원사업 정보를 정리합니다.</p>
    <h2>출처 표기</h2>
    <p>각 지원사업 글에는 가능한 한 공식기관 공고, 보도자료, 신청 페이지 링크를 함께 제공합니다.</p>
    <h2>오류 정정</h2>
    <p>지원사업의 기간, 대상, 금액은 변경될 수 있습니다. 오류가 확인되면 공식 자료 검토 후 수정합니다.</p>
    <h2>광고 및 제휴</h2>
    <p>사이트에는 광고가 게재될 수 있으며, 광고와 본문 정보는 명확히 구분합니다.</p>
