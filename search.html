<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, follow">
  <meta name="description" content="지원바라에서 정부지원금과 지원사업을 검색해보세요.">
  <title>지원사업 검색 - 지원바라</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body data-category="전체">
  <main class="legal-page category-page">
    <a class="brand" href="./index.html"><span class="brand-mark">✣</span><span>지원바라</span></a>
    <section class="category-hero">
      <div>
        <h1>지원사업 검색</h1>
        <p id="search-summary">지원사업명, 대상, 지원금, 공식기관을 기준으로 검색합니다.</p>
      </div>
      <strong class="category-count" data-category-count>0건</strong>
    </section>
    <section class="category-tools">
      <input data-category-search type="search" placeholder="검색어를 입력하세요">
      <div class="filter-chips">
        <button class="active" type="button" data-filter-status="전체">전체</button>
        <button type="button" data-filter-status="공고 확인">공고 확인</button>
        <button type="button" data-filter-status="마감 확인">마감 확인</button>
      </div>
    </section>
    <section class="category-list" data-category-list></section>
    <section class="source-check-box">
      <h2>검색 도움말</h2>
      <p>정확한 지원사업명을 모를 때는 핵심 단어로 검색해 보세요. 예를 들어 청년 월세, 전세, 창업, 소상공인, 장려금처럼 입력하면 관련 지원사업을 찾기 쉽습니다.</p>
      <p>검색 결과는 지원바라에 정리된 공개 글 기준입니다. 실제 신청 가능 여부는 각 상세글의 공식 출처에서 다시 확인해야 합니다.</p>
    </section>
  </main>
  <script src="./programs.js"></script>
  <script src="./static-links.js"></script>
  <script src="./category.js"></script>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var keyword = params.get("q") || "";
      var input = document.querySelector("[data-category-search]");
      var summary = document.getElementById("search-summary");
      if (input && keyword) {
        input.value = keyword;
        input.dispatchEvent(new Event("input"));
      }
      if (summary && keyword) {
        summary.textContent = '"' + keyword + '" 검색 결과입니다.';
      }
    }());
  </script>
</body>
</html>
