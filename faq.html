    <h1>자주 묻는 질문</h1>
    <h2>지원바라에서 바로 신청할 수 있나요?</h2>
    <p>지원바라는 정보를 정리해 제공하는 포털입니다. 실제 신청은 각 공식기관 신청 페이지에서 진행해야 합니다.</p>
    <h2>지원금 정보는 얼마나 자주 바뀌나요?</h2>
    <p>지원사업은 예산, 접수 기간, 기관 사정에 따라 변경될 수 있습니다. 신청 전 공식 공고를 확인하세요.</p>
    <h2>잘못된 정보는 어떻게 제보하나요?</h2>
    <p>문의 페이지의 이메일로 게시글 주소와 공식 출처를 함께 보내주시면 확인 후 반영합니다.</p>
